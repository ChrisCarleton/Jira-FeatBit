modules:
  # Shows a feature flag panel on every Jira issue
  jira:issuePanel:
    - key: featbit-flags-panel
      resource: main
      resolver:
        function: resolver
      title: FeatBit Feature Flags
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg

  # Global settings page for configuring the FeatBit connection
  jira:globalPage:
    - key: featbit-settings
      resource: main
      resolver:
        function: resolver
      title: FeatBit Settings

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: src/ui/dist
    # No tunnel.port — forge tunnel serves static/dist directly.
    # This avoids CSP violations caused by Vite dev server inline style injection.

app:
  id: ari:cloud:ecosystem::app/0b83f258-62f0-418c-ae30-a7be87b694f1
  runtime:
    name: nodejs20.x

permissions:
  scopes:
    - read:jira-user
    - read:jira-work
    - write:jira-work
    - storage:app
  external:
    fetch:
      backend:
        # Allow any HTTPS domain so users can configure their own self-hosted FeatBit instance.
        # Forge enforces HTTPS at the runtime level regardless of this setting.
        - '*'
