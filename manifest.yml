modules:
  # Shows a feature flag panel on every Jira issue
  jira:issuePanel:
    - key: featbit-flags-panel
      resource: main
      resolver:
        function: resolver
      title: FeatBit Feature Flags
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg

  # Global settings page for configuring the FeatBit connection
  jira:globalPage:
    - key: featbit-settings
      resource: main
      resolver:
        function: resolver
      title: FeatBit Settings

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/dist
    tunnel:
      port: 3000

app:
  id: ari:cloud:ecosystem::app/0b83f258-62f0-418c-ae30-a7be87b694f1
  runtime:
    name: nodejs20.x

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
  external:
    fetch:
      backend:
        # Add your hosted FeatBit domain here, e.g.:
        - 'featbit.your-company.com'
